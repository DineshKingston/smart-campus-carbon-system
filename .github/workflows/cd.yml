# ════════════════════════════════════════════════════════════
# CD — Continuous Deployment (Windows Self-Hosted Runner)
#
# Runs on YOUR Windows PC directly when push to main/master.
# No SSH, no secrets needed — runs locally via GitHub Runner.
#
# Setup (one time):
#   1. GitHub Repo → Settings → Actions → Runners → New self-hosted runner
#   2. Select Windows → run the 3 commands shown on the page
#   3. The runner registers your PC and listens for jobs
# ════════════════════════════════════════════════════════════

name: CD — Deploy (Windows Self-Hosted)

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Redeploy on Windows
    runs-on: self-hosted        

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Stop existing containers
        working-directory: ${{ github.workspace }}
        run: docker-compose down
        shell: powershell

      - name: Rebuild and start all services
        working-directory: ${{ github.workspace }}
        run: docker-compose up -d --build --remove-orphans
        shell: powershell

      - name: Wait for backend to be ready
        shell: powershell
        run: |
          Start-Sleep -Seconds 20
          $response = Invoke-WebRequest -Uri "http://localhost:8080/api/predictions/health" -UseBasicParsing -ErrorAction SilentlyContinue
          if ($response.StatusCode -eq 200) {
            Write-Host "✅ Backend is live!"
          } else {
            Write-Host "❌ Backend health check failed"
            exit 1
          }

      - name: Show running containers
        run: docker-compose ps
        shell: powershell
