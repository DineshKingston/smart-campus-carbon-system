# ════════════════════════════════════════════════════════════
# CD — Continuous Deployment
#
# ✅ DEPLOYMENT IS AUTOMATIC — No workflow needed!
#
# Railway  → Watches GitHub repo → auto-deploys on push:
#            • Backend  (Spring Boot)
#            • ML Service (Flask)
#            • Grafana
#            • MySQL (managed)
#
# Vercel   → Watches GitHub repo → auto-deploys on push:
#            • Frontend (React + Vite)
#
# This file is kept as documentation only.
# ════════════════════════════════════════════════════════════

name: CD — Deploy Info

on:
  push:
    branches: [ main, master ]

jobs:
  deploy-info:
    name: Deployment Info
    runs-on: ubuntu-latest
    steps:
      - name: Show deployment info
        run: |
          echo "════════════════════════════════════════"
          echo "  Deployment triggered by: ${{ github.actor }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "════════════════════════════════════════"
          echo "  Railway:  Auto-deploying Backend, ML, Grafana"
          echo "  Vercel:   Auto-deploying Frontend"
          echo "════════════════════════════════════════"
