# ════════════════════════════════════════════════════════════
# CI — Continuous Integration (GitHub-Hosted Runners)
#
# Validates build on every push/PR — FREE, always online.
# Deployment is handled automatically by:
#   Railway  → Backend, MySQL, ML Service, Grafana
#   Vercel   → Frontend
# ════════════════════════════════════════════════════════════

name: CI — Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── 1. Spring Boot Backend ─────────────────────────────────
  backend:
    name: Backend (Java / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build with Maven (skip tests)
        working-directory: carbon-backend
        run: mvn clean package -DskipTests --batch-mode

      - name: Run tests
        working-directory: carbon-backend
        run: mvn test --batch-mode
        continue-on-error: true

  # ── 2. React Frontend ──────────────────────────────────────
  frontend:
    name: Frontend (Node / React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: carbon-frontend/package-lock.json

      - name: Install dependencies
        working-directory: carbon-frontend
        run: npm ci

      - name: Build production bundle
        working-directory: carbon-frontend
        run: npm run build
        env:
          VITE_API_URL: https://placeholder-for-ci.example.com/api

  # ── 3. Flask ML Service ────────────────────────────────────
  ml-service:
    name: ML Service (Python / Flask)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: carbon-ml
        run: pip install -r requirements.txt

      - name: Syntax check
        working-directory: carbon-ml
        run: python -m py_compile app.py && echo "✅ app.py syntax OK"
