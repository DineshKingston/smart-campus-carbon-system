# ════════════════════════════════════════════════════
# Smart Campus Carbon Tracker — Docker Compose
#
# Services & Ports (public exposure):
#   mysql          : internal only (3306 not published)
#   carbon-ml      : ❌ internal only (port NOT exposed — security policy)
#   carbon-backend : ✅ 8080 (REST API + ML proxy)
#   carbon-frontend: ✅ 3000 (React SPA)
#   grafana        : ✅ 3001 (Dashboards)
# ════════════════════════════════════════════════════

services:

  # ── MySQL Database ────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: carbon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootPass@2024
      MYSQL_DATABASE: carbon_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pRootPass@2024" ]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - carbon-net

  # ── Flask ML API (INTERNAL ONLY — no ports published) ──
  carbon-ml:
    build:
      context: ./carbon-ml
      dockerfile: Dockerfile
    container_name: carbon-ml
    restart: unless-stopped
    # ⚠ NO ports: section intentionally — Flask is only reachable
    # by Spring Boot (carbon-backend) via Docker internal DNS.
    # React NEVER calls Flask directly.
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - carbon-net

  # ── Spring Boot Backend ───────────────────────────
  carbon-backend:
    build:
      context: ./carbon-backend
      dockerfile: Dockerfile
    container_name: carbon-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/carbon_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: RootPass@2024
      APP_JWT_SECRET: SmartCampusCarbonTrackerSuperSecretKeyForJWT2024!
      APP_JWT_EXPIRATION_MS: 86400000
      ML_SERVICE_URL: http://carbon-ml:5000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://carbon-frontend:3000
    depends_on:
      mysql:
        condition: service_healthy
      carbon-ml:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/predictions/health" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - carbon-net

  # ── React Frontend ────────────────────────────────
  carbon-frontend:
    build:
      context: ./carbon-frontend
      dockerfile: Dockerfile
    container_name: carbon-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - carbon-backend
    networks:
      - carbon-net

  # ── Grafana ───────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: carbon-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: GrafanaAdmin@2024
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - carbon-net

# ── Volumes & Networks ────────────────────────────
volumes:
  mysql_data:
  grafana_data:


networks:
  carbon-net:
    driver: bridge
