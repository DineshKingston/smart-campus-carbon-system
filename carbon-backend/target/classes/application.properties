# ─── Application ───────────────────────────────────────────────
spring.application.name=carbon-backend
server.port=8080

# ─── MySQL ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://mysql:3306/carbon_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=RootPass@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=SmartCampusCarbonTrackerSuperSecretKeyForJWT2024!
app.jwt.expiration-ms=86400000

# ─── Flask ML API (internal Docker network, never public) ──────
ml.service.url=http://carbon-ml:5000

# ─── CORS ──────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://carbon-frontend:3000,http://carbon-grafana:3001
