# ─── Application ───────────────────────────────────────────────
spring.application.name=carbon-backend
server.port=${PORT:8080}

# ─── MySQL ─────────────────────────────────────────────────────
# Fallbacks work for local Docker Compose. Set these as env vars on Railway.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/carbon_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:RootPass@2024}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:SmartCampusCarbonTrackerSuperSecretKeyForJWT2024!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ─── Flask ML API ──────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://carbon-ml:5000}

# ─── CORS ──────────────────────────────────────────────────────
# Add your Railway frontend URL here when deployed
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://carbon-frontend:3000}

