apiVersion: 1

datasources:
  - name: MySQL-CarbonDB
    type: mysql
    # Railway MySQL URL — set GF_MYSQL_URL as env var on Railway
    # Format: host:port  (e.g. mysql.railway.internal:3306)
    url: ${GF_MYSQL_URL}
    database: ${GF_MYSQL_DATABASE}
    user: ${GF_MYSQL_USER}
    secureJsonData:
      password: ${GF_MYSQL_PASSWORD}
    jsonData:
      maxOpenConns: 0
      maxIdleConns: 2
      connMaxLifetime: 14400
    isDefault: true
    editable: false
